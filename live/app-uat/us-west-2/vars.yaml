####################  SRE Cloudwatch Alerts start ####################

sre_cloudwatch_alert:
  athena_metric_processed_bytes_alarm: 
    name: "athena-metric-processed-bytes-alarm"
    alarm_description: "Alaram when Athena ProcessBytes exceeds 10GB in 5 minutes"
    severity: "Critical"
    comparison_operator: "GreaterThanOrEqualToThreshold"
    evaluation_periods: 1
    metric_name: "ProcessedBytes"
    namespace: "AWS/Athena"
    period: 300
    statistic: "Sum"
    threshold: 10737418240
    unit: "Bytes"
    dimensions:
     "WorkGroup": "primary"
  athena_metric_engine_execution_time_alarm: 
    name: "athena-metric-engine-execution-time-alarm"
    alarm_description: "Alaram when Athena query took to run more than 20 minutes"
    severity: "Critical"
    comparison_operator: "GreaterThanOrEqualToThreshold"
    evaluation_periods: 1
    metric_name: "EngineExecutionTime"
    namespace: "AWS/Athena"
    period: 60
    statistic: "Average"
    threshold: 1200
    unit: "Seconds"
    dimensions:
     "WorkGroup": "primary"    

####################  SRE Cloudwatch Alerts start ####################

## Cloudwatch Dashboard Updater
####################  Dashboard Updater Lambda Start ####################

# Event Bridge IAM Role for Lambda
dashboard_updater_event_bridge_scheduler_role:
  name: "dashboard-updater-event-bridge-role"
  description: "IAM Role for scheduling dashboard updater Lambda"
  iam_policy_s3_keys: [ "svc-wallet-sre-dashboard-event-bridge-policy" ]
  assume_role_json_file: "svc-wallet-dashboard-updater-event-bridge-assume-policy"

# Event Bridge Scheduler for Lambda
dashboard_updater_event_bridge_scheduler:
  name: "dashboard-updater-event-bridge-scheduler"
  schedule_expression: "cron(0 0 ? * 2 *)"  # Runs every Monday at 00:00 UTC
  schedule_expression_timezone: "UTC"
  flexible_time_window:
    mode: "OFF"

# Lambda Configuration
dashboard_updater_lambda:
  name: "sre-dashboard-updater"
  description: "Lambda function to update CloudWatch dashboard dynamically"
  runtime: "python3.9"
  handler: "lambda_function.lambda_handler"
  subnet_name: "app"
  memory: 256
  timeout: 60
  security_groups: [ "uat-usw2-infrastructure" ]
  environment_variables:
    DASHBOARD_NAME: "uat-usw2-wallet-wallet-dynamodb_tables_dashboard"
    SNS_TOPIC_ARN: "arn:aws:sns:us-west-2:289434761907:uat-usw2-wallet-temp_paze_sre_alarms"
    AWS_ACCOUNT_ID: "289434761907" 

  log_group:
    name: "/aws/lambda/dashboard-updater"
    retention_in_days: 90
    skip_destroy: false
    kms_key_id: null

  role:
    name: "dashboard-updater-lambda-execution-role"
    description: "IAM Role for dashboard updater Lambda"
    iam_policy_s3_keys: [ 
      "svc-wallet-dashboard-updater-policy"
      ##"svc-env-region-wallet-sre-dashboard-updater-policy"
    ]
    assume_role_json_file: "svc-wallet-dashboard-updater-assume-policy"

dashboard_updater_lambda_logs_subscriptions:
  name: "dashboard-updater-logs-subscription"
  role_arn: null
  log_group_name: "/aws/lambda/dashboard-updater"
  filter_pattern: ""
  distribution: null

####################  Dashboard Updater Lambda End ####################