---
# Bucket for SRE monitoring
s3_sre_operational_bucket:
  name: wallet-sre-operational-s3
  versioning: true
  kms: null
  lifecycle_configuration:
    transition_standard_ia_days: 30
    transition_glacier_days: 90
    expiration_days: 300
  cloudfront_oai_id: ""
  management_account_id: 289645091377

#s3_replica_sre_operational_bucket_key: null

s3_sre_operational_bucket_key:
  description: "wallet-sre-operational-s3-assets-key"
  deletion_window_in_days: 10
  alias_name: "uat-usw2-wallet-wallet-sre-operational-s3-bucket-key"
  multi_region: true
  policy_shared: false

# Bucket for Athena Query result
s3_duplicate_wallet_query_results_bucket:
  name: wallet-sre-query-results-s3
  versioning: true
  kms: null
  lifecycle_configuration:
    transition_standard_ia_days: 30
    transition_glacier_days: 90
    expiration_days: 300
  cloudfront_oai_id: ""
  management_account_id: 289645091377

#s3_replica_duplicate_wallet_query_results_bucket_key: null


s3_duplicate_wallet_query_results_bucket_key:
  description: "wallet-sre-query-results-s3-bucket-key"
  deletion_window_in_days: 10
  alias_name: "uat-usw2-wallet-wallet-sre-query-results-s3-bucket-key"
  multi_region: true
  policy_shared: false

# lambda to verify duplicate records
observability_check_lambda:
  name: "sre-observability-check-lambda"
  description: "observability-check"
  runtime: "python3.10"
  handler: "observability_lambda.lambda_handler"
  #filename: "observability_lambda.zip"
  subnet_name: "app"
  memory: 512
  timeout: 900
  security_groups: [ "uat-usw2-infrastructure" ]
  environment_variables:
    SPLUNK_HEC_TOKEN: c76b71f0-24e8-424a-a716-482ab343bdc9
    SPLUNK_HEC_URL: https://prodtools-splunk-heavy-forwarder.ews.int:8088/services/collector/event
    SPLUNK_INDEX: aws-uat
  log_group:
    name: "/aws/lambda/"
    retention_in_days: 90
    skip_destroy: false
    kms_key_id: null
  role:
    name: sre-observability-lambda-execution-role
    description: "sre lambda observability check execution role"
    iam_policy_s3_keys: [ "svc-uat-usw2-wallet-sre-observability-check-lambda-policy" ]
    assume_role_json_file: svc-uat-usw2-wallet-sre-observability-check-lambda-assume-policy
    additional_policy_arns: [ "arn:aws:iam::aws:policy/AmazonEC2FullAccess" ]

# lambda to collect the logs and stream to splunk tool
logsmonitor_lambda:
  name: "sre-lambda-logs-to-splunk-logging"
  description: "wallet-sre-lambda-logs-to-splunk-logging"
  runtime: "nodejs16.x"
  handler: "index.handler"
  #filename: "lambda_index.zip"
  subnet_name: "app"
  memory: 512
  timeout: 900
  security_groups: [ "uat-usw2-infrastructure" ]
  environment_variables:
    SPLUNK_HEC_TOKEN: c76b71f0-24e8-424a-a716-482ab343bdc9
    SPLUNK_HEC_URL: https://prodtools-splunk-heavy-forwarder.ews.int:8088/services/collector/event
    SPLUNK_INDEX: aws-uat
  log_group:
    name: "/aws/lambda/"
    retention_in_days: 90
    skip_destroy: false
    kms_key_id: null
  role:
    name: sre-lambda-splunk-logging-execution-role
    description: "sre lambda splunk logging execution role"
    iam_policy_s3_keys: [ "svc-uat-usw2-wallet-sre-lambda-logs-policy" ]
    assume_role_json_file: svc-uat-usw2-wallet-sre-lambda-logs-assume-policy
    additional_policy_arns: [ "arn:aws:iam::aws:policy/AmazonEC2FullAccess" ]

logsmonitor_lambdaoutput_subscriptions:
  name: "sre-lambda-output-splunk-logging"
  role_arn: null
  log_group_name: "/aws/lambda/uat-usw2-wallet-sre-observability-check-lambda"
  filter_pattern: ""
  # destination_arn: "arn:aws:lambda:us-west-2:289434761907:function:uat-usw2-wallet-sre-lambda-logs-to-splunk-logging"
  distribution: null

