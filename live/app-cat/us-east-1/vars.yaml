# Cloudwatch Route53 Health Checks
r53_health_checks:
  - name: "b2b-east"
    fqdn: "b2b-east.wallet.cat.earlywarning.io"
    protocol_type: "HTTPS"
    request_interval: 30
    failure_threshold: 3
    port: 443
    resource_path: "/"
