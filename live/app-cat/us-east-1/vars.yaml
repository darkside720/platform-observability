# Kinesis Metrics Monitoring
kinesis_streams:
  - name: "cat-use1-wallet-analytics-kds"
    metrics:
      - metric_name: "GetRecords.Bytes"
        statistic: "Sum"
        threshold: 250000000  # Threshold in bytes
        comparison_operator: "GreaterThanThreshold"
      - metric_name: "GetRecords.IteratorAgeMilliseconds"
        statistic: "Maximum"
        threshold: 1000000  # Threshold in milliseconds (5 minutes)
        comparison_operator: "GreaterThanThreshold"
      - metric_name: "GetRecords.Latency"
        statistic: "Average"
        threshold: 500  # Threshold in milliseconds
        comparison_operator: "GreaterThanThreshold"
      - metric_name: "GetRecords.Records"
        statistic: "Sum"
        threshold: 100000  # Threshold in number of records
        comparison_operator: "GreaterThanThreshold"
      - metric_name: "PutRecords.FailedRecords"
        statistic: "Sum"
        threshold: 100  # Threshold in number of failed records
        comparison_operator: "GreaterThanThreshold"
      - metric_name: "PutRecords.TotalRecords"
        statistic: "Sum"
        threshold: 500000  # Threshold in total number of records
        comparison_operator: "GreaterThanThreshold"
      - metric_name: "PutRecords.FailedRecords.Percent"
        statistic: "Average"
        threshold: 5  # Threshold in percentage of failed records
        comparison_operator: "GreaterThanThreshold"
      - metric_name: "PutRecords.ThrottleRecords"
        statistic: "Sum"
        threshold: 30  # Threshold for throttled records
        comparison_operator: "GreaterThanThreshold"
      - metric_name: "WriteProvisionedThroughputExceeded"
        statistic: "Average"
        threshold: 5  # Threshold for throughput exceeded
        comparison_operator: "GreaterThanThreshold"
